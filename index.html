<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Super PhotoBooth Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        min-height: 100vh;
      }

      #flash {
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        background-color: white;
        z-index: 9999;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.1s ease-out;
      }
      .flash-active { opacity: 1 !important; }

      .container {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: rgba(255, 255, 255, 0.95);
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        backdrop-filter: blur(10px);
      }

      .capture-section, .upload-section, .editor {
        display: none;
      }

      .capture-section.active, .upload-section.active, .editor.active {
        display: flex;
        flex-direction: column;
        align-items: center;
        animation: fadeIn 0.5s;
      }

      @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

      .button {
        background-color: #ff7e67;
        color: #fff;
        border: none;
        padding: 12px 24px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        margin: 8px 5px;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        transition: all 0.2s;
      }

      .button:disabled { background-color: #ccc; cursor: not-allowed; box-shadow: none; }
      .button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15); }
      .button:active:not(:disabled) { transform: translateY(0); }

      #capture-btn { background-color: #ff6b81; font-size: 20px; padding: 15px 30px; }
      #capture-btn::before { content: "📸 "; }
      #beauty-btn { background-color: #7bed9f; color: #2f3542; }
      #beauty-btn.active { background-color: #2ed573; color: white; box-shadow: 0 0 10px #2ed573; }
      #download-btn { background-color: #9b59b6; width: 100%; margin-top: 15px;}
      #retake-btn { background-color: #ff4757; width: 100%;}

      .video-container {
        position: relative;
        width: 640px;
        height: 480px;
        margin: 15px 0;
      }

      video {
        width: 100%; height: 100%;
        border-radius: 15px;
        background-color: #000;
        transform: scaleX(-1);
        object-fit: cover;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        transition: filter 0.3s;
      }

      .beauty-on {
        filter: brightness(1.15) contrast(0.95) saturate(1.2) blur(0.5px);
      }

      #countdown {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 150px;
        font-weight: bold;
        color: #fff;
        background-color: rgba(0, 0, 0, 0.4);
        border-radius: 15px;
        display: none;
        text-shadow: 0 0 20px rgba(0,0,0,0.5);
      }

      #photos {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 10px;
      }

      .photo-slot {
        width: 140px; height: 100px;
        background-color: #eee;
        border: 3px dashed #ccc;
        border-radius: 10px;
        transform: scaleX(-1);
        display: flex; justify-content: center; align-items: center;
        overflow: hidden;
      }

      .photo-slot img { width: 100%; height: 100%; object-fit: cover; }

      .editor {
        flex-direction: row !important;
        gap: 40px;
      }

      .photostrip-container { position: relative; }

      .photostrip {
        background-color: #fff;
        padding: 20px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        border-radius: 5px;
        position: relative;
        overflow: hidden; 
      }

      .bg-white { background-color: #fff; }
      .bg-haru { background-color: #aebce5; background-image: linear-gradient(#ffffff 2px, transparent 2px), linear-gradient(90deg, #ffffff 2px, transparent 2px); background-size: 20px 20px; }
      .bg-pink-dots { background-color: #ffcccc; background-image: radial-gradient(#fff 15%, transparent 16%), radial-gradient(#fff 15%, transparent 16%); background-size: 30px 30px; background-position: 0 0, 15px 15px; }
      .bg-grid-cute { background-color: #fdfbfb; background-image: linear-gradient(#e2e8f0 1.5px, transparent 1.5px), linear-gradient(90deg, #e2e8f0 1.5px, transparent 1.5px); background-size: 25px 25px; }
      .bg-mint-stripes { background: repeating-linear-gradient(45deg, #a8edea, #a8edea 10px, #e2f8f7 10px, #e2f8f7 20px); }
      .bg-pastel-gradient { background: linear-gradient(120deg, #fccb90 0%, #d57eeb 100%); }
      .bg-sunset { background: linear-gradient(to top, #ff0844 0%, #ffb199 100%); }
      .bg-lavender { background-color: #e0c3fc; background-image: radial-gradient(#fff 2.5px, transparent 2.5px); background-size: 20px 20px; }
      .bg-yellow-daisy { background-color: #fdfbfb; background-image: radial-gradient(#f6d365 3.5px, transparent 3.5px); background-size: 25px 25px; }
      .bg-holographic { background: linear-gradient(45deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%); }
      .bg-ocean { background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%); }

      .photostrip img {
        width: 250px; height: 180px; object-fit: cover;
        border: 4px solid #fff; margin-bottom: 15px; display: block;
        transform: scaleX(-1); border-radius: 5px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      }

      .photostrip .date {
        text-align: center; font-size: 16px; font-family: 'Courier New', Courier, monospace;
        font-weight: bold; color: #333; background: rgba(255,255,255,0.7);
        padding: 5px; border-radius: 5px;
      }

      .photostrip-container .sticker {
        position: absolute; font-size: 30px; user-select: none;
        cursor: grab;
        filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        transition: transform 0.1s;
      }
      .photostrip-container .sticker:active { cursor: grabbing; transform: scale(1.1); }
      
      .photostrip-container .text-sticker {
        font-family: 'Comic Sans MS', cursive, sans-serif;
        font-size: 24px; font-weight: bold; color: #ff4757; text-shadow: 2px 2px 0px #fff;
      }

      .controls { width: 350px; text-align: left; }
      .control-section { margin-bottom: 15px; background: #f8f9fa; padding: 15px; border-radius: 10px; border: 1px solid #e1e8ed; }
      .control-section label { display: block; font-weight: bold; margin-bottom: 10px; color: #2f3542; }
      .btn-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
      
      .circle-btn {
        width: 35px; height: 35px; border-radius: 50%; border: 2px solid #ddd;
        cursor: pointer; transition: transform 0.1s;
      }
      .circle-btn:hover { transform: scale(1.15); border-color: #ff6b81; }
      .text-btn { padding: 8px 12px; border-radius: 8px; border: 1px solid #ccc; cursor: pointer; background: white;}
      .text-btn:hover { background: #ffeaa7; transform: scale(1.05); }

    </style>
  </head>
  <body>
    <div id="flash"></div> 
    
    <div class="container">
      <h1 style="color: #2f3542; margin-bottom: 5px;">📸</h1>
      <p style="color: #747d8c; margin-top: 0; margin-bottom: 20px;">Chill thử cho vui nè !</p>

      <div class="capture-section active" id="capture-section">
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <button id="capture-btn" class="button">Bắt đầu chụp (4 nháy)</button>
            <button id="beauty-btn" class="button">✨ Bật Beauty Mode</button>
        </div>
        
        <div class="video-container">
          <video id="video" autoplay></video>
          <div id="countdown"></div>
        </div>
        <div id="photos">
          <div class="photo-slot" id="slot-1"></div>
          <div class="photo-slot" id="slot-2"></div>
          <div class="photo-slot" id="slot-3"></div>
          <div class="photo-slot" id="slot-4"></div>
        </div>
      </div>

      <div class="editor" id="editor">
        <div class="photostrip-container">
          <div class="photostrip" id="photostrip">
            <div><img id="photo-1" src="" alt=" " /></div>
            <div><img id="photo-2" src="" alt=" " /></div>
            <div><img id="photo-3" src="" alt=" " /></div>
            <div><img id="photo-4" src="" alt=" " /></div>
            <div class="date" id="date-stamp"></div>
          </div>
        </div>
        
        <div class="controls">
          <div class="control-section">
            <label>🖼️ Chọn Hình Nền (Background)</label>
            <div class="btn-wrap">
                <button class="circle-btn bg-white" data-bg="bg-white"></button>
                <button class="circle-btn bg-haru" data-bg="bg-haru"></button>
                <button class="circle-btn bg-pink-dots" data-bg="bg-pink-dots"></button>
                <button class="circle-btn bg-grid-cute" data-bg="bg-grid-cute"></button>
                <button class="circle-btn bg-mint-stripes" data-bg="bg-mint-stripes"></button>
                <button class="circle-btn bg-pastel-gradient" data-bg="bg-pastel-gradient"></button>
                <button class="circle-btn bg-sunset" data-bg="bg-sunset"></button>
                <button class="circle-btn bg-lavender" data-bg="bg-lavender"></button>
                <button class="circle-btn bg-yellow-daisy" data-bg="bg-yellow-daisy"></button>
                <button class="circle-btn bg-holographic" data-bg="bg-holographic"></button>
                <button class="circle-btn bg-ocean" data-bg="bg-ocean"></button>
            </div>
          </div>

          <div class="control-section stickers">
            <label>🎨 Stickers (Click để dán, KÉO để di chuyển, CLICK ĐÚP để xóa)</label>
            <div class="btn-wrap">
                <button data-sticker="❤️" class="text-btn">❤️</button>
                <button data-sticker="✨" class="text-btn">✨</button>
                <button data-sticker="🎀" class="text-btn">🎀</button>
                <button data-sticker="🐶" class="text-btn">🐶</button>
                <button data-sticker="😎" class="text-btn">😎</button>
                <button data-sticker="🌸" class="text-btn">🌸</button>
                <button data-sticker="⭐" class="text-btn">⭐</button>
                <button data-sticker="👑" class="text-btn">👑</button>
                <button data-sticker="I LOVE YOU" class="text-btn text-sticker-btn">I LOVE YOU</button>
                <button data-sticker="BFF 💕" class="text-btn text-sticker-btn">BFF 💕</button>
            </div>
          </div>

          <div class="action-buttons">
            <button id="download-btn" class="button">⬇️ Tải Ảnh Xuống</button>
            <button id="retake-btn" class="button">🔄 Chụp Lại Lần Nữa</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const captureSection = document.getElementById("capture-section");
      const editor = document.getElementById("editor");
      const slots = [
        document.getElementById("slot-1"), document.getElementById("slot-2"),
        document.getElementById("slot-3"), document.getElementById("slot-4")
      ];
      const photos = [
        document.getElementById("photo-1"), document.getElementById("photo-2"),
        document.getElementById("photo-3"), document.getElementById("photo-4")
      ];
      const video = document.getElementById("video");
      const captureBtn = document.getElementById("capture-btn");
      const beautyBtn = document.getElementById("beauty-btn");
      const countdown = document.getElementById("countdown");
      const flash = document.getElementById("flash");
      const photostrip = document.getElementById("photostrip");
      
      let capturedImages = [];
      let currentSlotIndex = 0;
      let isBeautyMode = false;

      const updateDate = () => {
        const dateOptions = { timeZone: 'Asia/Ho_Chi_Minh', year: 'numeric', month: '2-digit', day: '2-digit' };
        document.getElementById('date-stamp').textContent = new Date().toLocaleDateString('vi-VN', dateOptions);
      };

      navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } })
        .then((stream) => { video.srcObject = stream; })
        .catch(() => { alert("Lỗi Camera! Vui lòng cấp quyền camera trong trình duyệt."); });

      beautyBtn.addEventListener("click", () => {
        isBeautyMode = !isBeautyMode;
        beautyBtn.classList.toggle("active");
        video.classList.toggle("beauty-on");
      });

      captureBtn.addEventListener("click", () => {
        captureBtn.disabled = true;
        takeNextPhoto();
      });

      function takeNextPhoto() {
        if (currentSlotIndex >= slots.length) {
            setTimeout(() => {
                captureSection.classList.remove("active");
                editor.classList.add("active");
                updateDate();
                renderEditPhotos();
            }, 1000);
            return;
        }

        let timeLeft = 3;
        countdown.style.display = "flex";
        countdown.textContent = timeLeft;

        const countdownInterval = setInterval(() => {
          timeLeft--;
          if (timeLeft > 0) {
            countdown.textContent = timeLeft;
          } else {
            clearInterval(countdownInterval);
            countdown.style.display = "none";
            
            flash.classList.add("flash-active");
            setTimeout(() => flash.classList.remove("flash-active"), 150);
            
            capturePhotoToCanvas();
            setTimeout(takeNextPhoto, 1000);
          }
        }, 1000);
      }

      function capturePhotoToCanvas() {
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        if(isBeautyMode) context.filter = "brightness(1.15) contrast(0.95) saturate(1.2) blur(1px)";
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const dataURL = canvas.toDataURL("image/png");
        const img = document.createElement("img");
        img.src = dataURL;
        slots[currentSlotIndex].innerHTML = "";
        slots[currentSlotIndex].appendChild(img);
        capturedImages[currentSlotIndex] = dataURL;
        currentSlotIndex++;
      }

      function renderEditPhotos() {
        capturedImages.forEach((dataURL, index) => { photos[index].src = dataURL; });
      }

      document.querySelectorAll(".circle-btn").forEach(button => {
        button.addEventListener("click", () => {
          photostrip.className = "photostrip"; 
          const bgClass = button.getAttribute("data-bg");
          photostrip.classList.add(bgClass);
        });
      });

      document.querySelectorAll(".stickers button").forEach(button => {
        button.addEventListener("click", () => {
          const stickerText = button.getAttribute("data-sticker");
          const stickerEl = document.createElement("span");
          
          stickerEl.textContent = stickerText;
          stickerEl.className = (stickerText.length > 2) ? "sticker text-sticker" : "sticker";
          
          stickerEl.style.top = (Math.random() * 500 + 50) + "px";
          stickerEl.style.left = (Math.random() * 100 + 50) + "px";
          
          stickerEl.addEventListener('dblclick', () => { stickerEl.remove(); });
          photostrip.appendChild(stickerEl);
          dragElement(stickerEl);
        });
      });

      function dragElement(elmnt) {
        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        
        elmnt.onmousedown = dragMouseDown;
        elmnt.ontouchstart = dragMouseDown; 

        function dragMouseDown(e) {
          e = e || window.event;
          if(e.type === 'touchstart') e.preventDefault(); 
          
          pos3 = e.clientX || e.touches[0].clientX;
          pos4 = e.clientY || e.touches[0].clientY;
          
          document.onmouseup = closeDragElement;
          document.ontouchend = closeDragElement;
          
          document.onmousemove = elementDrag;
          document.ontouchmove = elementDrag;
        }

        function elementDrag(e) {
          e = e || window.event;
          if(e.type === 'touchmove') e.preventDefault(); 
          
          let clientX = e.clientX || e.touches[0].clientX;
          let clientY = e.clientY || e.touches[0].clientY;
          
          pos1 = pos3 - clientX;
          pos2 = pos4 - clientY;
          pos3 = clientX;
          pos4 = clientY;
          
          elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
          elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
        }

        function closeDragElement() {
          document.onmouseup = null;
          document.onmousemove = null;
          document.ontouchend = null;
          document.ontouchmove = null;
        }
      }

      document.getElementById("retake-btn").addEventListener("click", () => {
        editor.classList.remove("active");
        captureSection.classList.add("active");
        currentSlotIndex = 0; capturedImages = [];
        slots.forEach(slot => slot.innerHTML = "");
        document.querySelectorAll(".photostrip .sticker").forEach(el => el.remove());
        captureBtn.disabled = false;
      });

      // TÍNH NĂNG TẢI ẢNH ĐÃ ĐƯỢC NÂNG CẤP XỊN SÒ TRỞ LẠI
      document.getElementById("download-btn").addEventListener("click", () => {
        // Hiện thông báo theo đúng kịch bản sếp giao
        alert("Nếu lỡ có cần lưu ảnh thì mình cũng có thể chụp màn hình sau khi tải ảnh cho sắc nét nha mọi người !!!");
        
        // Gọi html2canvas để render toàn bộ div 'photostrip' thành 1 tấm ảnh thật
        html2canvas(document.getElementById("photostrip"), {
            scale: 2, // Tăng chất lượng ảnh lên gấp đôi cho nét
            useCORS: true, 
            backgroundColor: null // Giữ nền trong suốt/gradient nếu có
        }).then(canvas => {
            // Đổi canvas thành dạng URL ảnh và tải về máy
            const link = document.createElement("a");
            link.download = "ANHCHUP.png";
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
      });

    </script>
  </body>
</html>
